# Production Backend Configuration
database:
  # Credentials must be supplied via MONGODB_URI environment variable
  mongodb_uri: mongodb://localhost:27017
  db_name: "minhmom_dev"
  default_group_id: null

# Image serving configuration
images:
  base_path: "/app/images"
  posts_dir: "posts"
  comments_dir: "comments"
  orders_dir: "orders"
  allowed_extensions: [".jpg", ".jpeg", ".png", ".gif", ".webp"]
  max_file_size_mb: 10

# API configuration
api:
  title: "MinhMom Backend"
  version: "0.1.0"
  cors_origins:
    - "https://minhmom.ddns.net"

# Logging configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
